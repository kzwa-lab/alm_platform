<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ALM Operational Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/alm-platform.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="brand">
          <i data-lucide="landmark" class="brand-icon"></i>
          <span class="brand-text">ALM Platform</span>
        </div>
        <button class="btn-icon sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <i data-lucide="panel-left"></i>
        </button>
      </div>
      <nav class="sidebar-nav" id="navTree">
        <!-- Nav items generated by JS -->
      </nav>
      <div class="sidebar-footer">
        <a href="#settings" class="nav-item" data-nav="settings">
          <i data-lucide="settings"></i>
          <span>Settings</span>
        </a>
        <a href="#docs" class="nav-item" data-nav="docs">
          <i data-lucide="book-open"></i>
          <span>Documentation</span>
        </a>
      </div>
    </aside>

    <!-- Main wrapper -->
    <div class="main-wrapper">
      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-left">
          <button class="btn-icon mobile-menu-toggle" id="mobileMenuToggle" aria-label="Open menu">
            <i data-lucide="menu"></i>
          </button>
          <div class="breadcrumb" id="breadcrumb">
            <a href="#dashboard">Dashboard</a>
          </div>
        </div>
        <div class="topbar-center">
          <div class="global-search">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" placeholder="Search reports, metrics, ISINs, entities..." id="globalSearch">
            <kbd class="search-kbd">Ctrl K</kbd>
          </div>
        </div>
        <div class="topbar-right">
          <button class="btn-icon" id="notificationBtn" aria-label="Notifications">
            <i data-lucide="bell"></i>
            <span class="badge">3</span>
          </button>
          <button class="btn-icon" id="taskBtn" aria-label="Tasks">
            <i data-lucide="clipboard-list"></i>
            <span class="badge badge-blue">2</span>
          </button>
          <button class="btn-icon" id="themeToggle" aria-label="Toggle theme">
            <span id="themeIcon"><i data-lucide="sun"></i></span>
          </button>
          <div class="user-menu">
            <div class="avatar">KA</div>
            <div class="user-info">
              <span class="user-name">K. Asante</span>
              <span class="user-role">CRO / Risk Committee Chair</span>
            </div>
          </div>
        </div>
      </header>

      <!-- Context switcher -->
      <div class="context-bar">
        <div class="context-item">
          <label>Entity</label>
          <button class="context-dropdown">
            <i data-lucide="building2"></i>
            <span>Ecobank Ghana PLC (Consolidated)</span>
            <i data-lucide="chevron-down" class="chevron"></i>
          </button>
        </div>
        <div class="context-item">
          <label>Reporting Date</label>
          <button class="context-dropdown">
            <i data-lucide="calendar"></i>
            <span>30 Jun 2026</span>
            <i data-lucide="chevron-down" class="chevron"></i>
          </button>
        </div>
        <div class="context-item">
          <label>Scenario</label>
          <button class="context-dropdown">
            <i data-lucide="layers"></i>
            <span>Base Case</span>
            <i data-lucide="chevron-down" class="chevron"></i>
          </button>
        </div>
        <div class="context-item">
          <label>Currency</label>
          <button class="context-dropdown">
            <i data-lucide="globe"></i>
            <span>GHS (₵)</span>
            <i data-lucide="chevron-down" class="chevron"></i>
          </button>
        </div>
        <div class="context-item">
          <label>Reference Rate</label>
          <button class="context-dropdown">
            <i data-lucide="percent"></i>
            <span>GRR 25.50%</span>
            <i data-lucide="chevron-down" class="chevron"></i>
          </button>
        </div>
      </div>

      <!-- Main content -->
      <main class="main-content" id="mainContent">
        <!-- Views injected by router -->
      </main>
    </div>
  </div>
  <div class="mobile-overlay"></div>

  <script src="js/app.js"></script>
</body>
</html>
