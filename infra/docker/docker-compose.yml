version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: alm-postgres
    environment:
      POSTGRES_USER: alm
      POSTGRES_PASSWORD: alm
      POSTGRES_DB: alm_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alm -d alm_platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: alm-api
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://alm:alm@postgres:5432/alm_platform
      JWT_SECRET: alm-platform-dev-secret-change-in-production
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: debug
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
    command: pnpm --filter @alm/api dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: alm-web
    environment:
      VITE_API_URL: http://localhost:3001
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./packages:/app/packages
    command: pnpm --filter @alm/web dev

volumes:
  postgres_data:
